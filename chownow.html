<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elephant Walk - Order Now</title>
    <link rel="shortcut icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&family=Forum&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assets/css/style.css" />
    <style>
      body {
        background: #070707;
      }
      .chownow-shell {
        min-height: 100vh;
        display: grid;
        gap: 20px;
        padding: 24px;
        max-width: 1200px;
        margin: 0 auto;
      }
      .chownow-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
      }
      .chownow-header h1 {
        font-size: clamp(1.8rem, 3vw, 2.6rem);
        color: #fff;
        margin: 0;
      }
      .chownow-frame {
        background: #111;
        border-radius: 24px;
        overflow: hidden;
        min-height: 80vh;
      }
      .chownow-frame iframe {
        width: 100%;
        height: 100%;
        min-height: 72vh;
        border: 0;
      }
      .btn-back {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 12px 22px;
        border-radius: 999px;
        border: 1px solid rgba(201, 168, 76, 0.6);
        background: transparent;
        color: #fff;
        text-decoration: none;
        font-weight: 700;
      }
      .btn-back:hover {
        background: rgba(201, 168, 76, 0.14);
      }
    </style>
  </head>
  <body>
    <div class="chownow-shell">
      <div class="chownow-header">
        <div>
          <h1>Order with ChowNow</h1>
          <p style="color: #aaa; margin: 10px 0 0">
            Your online ordering page will load below.
          </p>
        </div>
        <a
          href="#"
          onclick="
            history.back();
            return false;
          "
          class="btn-back"
          >Go Back</a
        >
      </div>
      <div class="chownow-frame">
        <iframe
          id="chownow-iframe"
          src="https://www.chownow.com/embed/RESTAURANT-SLUG"
          title="ChowNow ordering"
          allow="fullscreen; payment"
        ></iframe>
      </div>
    </div>
  </body>
</html>
